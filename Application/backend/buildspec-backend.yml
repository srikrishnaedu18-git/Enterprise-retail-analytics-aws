version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 373949235638.dkr.ecr.us-east-1.amazonaws.com
      - REPOSITORY_URI=373949235638.dkr.ecr.us-east-1.amazonaws.com/retail-backend
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image explicitly from the root directory context...
      # Standardized build path mapping to eliminate case sensitivity hopping issues
      - docker build -f Application/backend/Dockerfile -t $REPOSITORY_URI:latest Application/backend
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker images to ECR...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Writing image definitions file for ECS...
      # Spits out the configuration file right in the repository root where CodePipeline expects it
      - printf '[{"name":"backend","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json